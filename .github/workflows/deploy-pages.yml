# Deploy do site estatico no GitHub Pages
# A chave NUNCA vai para o repositorio: so existe no secret e no artifact do deploy
name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preparar pasta de publicacao
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            --exclude '.env' \
            --exclude '.env.example' \
            --exclude 'scripts' \
            --exclude '.gitignore' \
            --exclude 'js/config.js' \
            ./ _site/

      - name: Gerar js/config.js apenas no artifact (nao versionado)
        env:
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          if [ -z "$WEB3FORMS_ACCESS_KEY" ]; then
            echo "::error::Secret WEB3FORMS_ACCESS_KEY ausente. Configure em Settings > Secrets."
            exit 1
          fi
          mkdir -p _site/js
          # Escreve direto no _site para nao depender de arquivo no git
          node -e '
            const fs = require("fs");
            const key = process.env.WEB3FORMS_ACCESS_KEY.trim();
            if (!key) { console.error("chave vazia"); process.exit(1); }
            const body = [
              "/* Gerado no CI — nao versionar */",
              "window.RDJ_CONFIG = {",
              "  web3formsAccessKey: " + JSON.stringify(key),
              "};",
              ""
            ].join("\n");
            fs.writeFileSync("_site/js/config.js", body, "utf8");
            console.log("config.js gerado em _site/js (" + body.length + " bytes)");
          '
          test -f _site/js/config.js
          # Nao imprime a chave nos logs
          grep -q "web3formsAccessKey" _site/js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
